<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Attendant's Schedule</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: Arial, sans-serif; background: #f0f0f0; color: #222; padding-bottom: 60px; -webkit-text-size-adjust: 100%; }

/* HEADER */
.hdr { background:#fff; border-bottom:3px solid #FFD700; padding:12px 16px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:99; box-shadow:0 2px 8px rgba(0,0,0,0.07); }
.hdr h1 { font-size:15px; font-weight:900; color:#222; display:flex; align-items:center; gap:8px; }
.hdr h1 img { width:22px; height:22px; object-fit:contain; flex-shrink:0; border-radius:4px; }
.hdr p  { font-size:11px; color:#aaa; margin-top:1px; }
.badge  { background:#FFD700; color:#333; font-size:11px; font-weight:700; padding:4px 10px; border-radius:20px; white-space:nowrap; }

/* TABS */
.tabs { display:flex; background:#fff; border-bottom:1px solid #eee; }
.tab  { flex:1; padding:11px 6px; text-align:center; font-size:12px; font-weight:700; color:#aaa; background:#fafafa; border:none; border-bottom:3px solid transparent; cursor:pointer; font-family:Arial,sans-serif; transition:all 0.15s; }
.tab.on { color:#333; background:#fff; border-bottom-color:#FFD700; }

/* PANELS */
.panel { display:none; background:#fff; padding:12px 14px; }
.panel.on { display:block; }
.panel-label { font-size:11px; font-weight:700; padding:0 0 8px; }
.c-green { color:#2a7a2a; } .c-blue { color:#2244cc; }

/* NAME LIST */
.name-list { display:flex; flex-direction:column; gap:6px; margin-bottom:10px; }
.name-row  { display:flex; align-items:center; gap:8px; background:#fafafa; border:1px solid #e8e8e8; border-radius:8px; padding:8px 10px; }
.drag-handle { color:#ccc; font-size:15px; flex-shrink:0; user-select:none; }
.row-num  { font-size:11px; color:#ccc; font-weight:700; min-width:16px; text-align:center; flex-shrink:0; }
.name-row input { flex:1; font-size:15px; padding:2px 0; border:none; background:transparent; color:#222; outline:none; font-family:Arial,sans-serif; min-width:0; }
.name-row input:focus { border-bottom:2px solid #FFD700; }
.btn-x { background:none; border:none; color:#ddd; font-size:22px; line-height:1; padding:0 4px; cursor:pointer; flex-shrink:0; font-family:Arial,sans-serif; }
.btn-x:active { color:#c00; }
.btn-add { width:100%; font-size:13px; padding:10px 12px; background:#f7f7f7; border:1px dashed #ccc; border-radius:8px; cursor:pointer; color:#777; text-align:left; font-family:Arial,sans-serif; }
.btn-add:active { background:#fffbea; border-color:#FFD700; }

/* SETTINGS */
.settings { background:#fff; border-top:1px solid #eee; padding:14px 16px; }
.field { margin-bottom:12px; }
.field label { display:block; font-size:11px; color:#999; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:5px; }
.field input { width:100%; font-size:15px; padding:10px 12px; border:1px solid #ddd; border-radius:8px; background:#fafafa; color:#222; outline:none; font-family:Arial,sans-serif; -webkit-appearance:none; }
.field input:focus { border-color:#FFD700; background:#fffbea; }
.row2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }

/* CHIPS */
.chip-lbl { font-size:11px; color:#999; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px; }
.chips { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; }
.chip { display:flex; align-items:center; gap:5px; background:#f0f0f0; border:2px solid #e0e0e0; border-radius:20px; padding:7px 13px; font-size:12px; font-weight:700; color:#aaa; cursor:pointer; user-select:none; transition:all 0.15s; }
.chip input { display:none; }
.dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.chip.on-green  { background:#e8f9e8; border-color:#2a7a2a; color:#2a7a2a; }
.chip.on-blue   { background:#eaefff; border-color:#2244cc; color:#2244cc; }
.chip.on-red    { background:#fff0f0; border-color:#cc2222; color:#cc2222; }
.chip.on-purple { background:#f5f0ff; border-color:#7c3aed; color:#7c3aed; }

/* BUTTONS */
.btn-gen { width:100%; padding:15px; background:#FFD700; border:none; border-radius:10px; font-size:16px; font-weight:900; cursor:pointer; color:#333; font-family:Arial,sans-serif; letter-spacing:0.5px; margin-bottom:10px; transition:all 0.15s; }
.btn-gen:active { background:#e6c200; transform:scale(0.98); }
.btn-pair { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:10px; }
.btn-sec { padding:12px; background:#fff; border:1.5px solid #ddd; border-radius:8px; font-size:13px; cursor:pointer; color:#555; font-family:Arial,sans-serif; text-align:center; }
.btn-sec:active { background:#f0f0f0; }
.tip { font-size:11px; color:#bbb; text-align:center; line-height:1.6; }
.err { font-size:13px; color:#a00; background:#fff0f0; border:1px solid #fcc; border-radius:6px; padding:8px 12px; margin-bottom:10px; display:none; }

/* NAMES SUMMARY BAR (replaces the old always-open tabs) */
.names-bar { display:flex; gap:8px; padding:12px 14px; background:#fff; border-bottom:1px solid #eee; }
.names-card { flex:1; display:flex; align-items:center; justify-content:space-between; gap:8px; background:#fafafa; border:1px solid #e8e8e8; border-radius:10px; padding:10px 12px; cursor:pointer; text-align:left; font-family:Arial,sans-serif; }
.names-card:active { background:#fffbea; border-color:#FFD700; }
.names-card .nc-title { font-size:11px; font-weight:900; text-transform:uppercase; letter-spacing:0.5px; }
.names-card .nc-sub { font-size:11px; color:#999; margin-top:2px; }
.names-card .nc-arrow { color:#ccc; font-size:18px; flex-shrink:0; }
.names-card.green .nc-title { color:#2a7a2a; }
.names-card.blue  .nc-title { color:#2244cc; }

/* MODAL POPUP */
.modal-backdrop { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:200; }
.modal-backdrop.on { display:block; }
.modal-sheet { position:fixed; left:0; right:0; bottom:0; max-height:85vh; background:#fff; border-radius:16px 16px 0 0; z-index:201; display:flex; flex-direction:column; box-shadow:0 -4px 24px rgba(0,0,0,0.2); animation:slideUp 0.2s ease-out; }
@keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
.modal-hdr { display:flex; align-items:center; justify-content:space-between; padding:14px 16px; border-bottom:1px solid #eee; flex-shrink:0; }
.modal-hdr .m-title { font-size:14px; font-weight:900; }
.modal-close { background:#f0f0f0; border:none; border-radius:50%; width:30px; height:30px; font-size:16px; color:#777; cursor:pointer; flex-shrink:0; }
.modal-close:active { background:#e0e0e0; }
.modal-body { padding:14px; overflow-y:auto; -webkit-overflow-scrolling:touch; }
.modal-done { padding:12px 14px 16px; border-top:1px solid #eee; flex-shrink:0; }
.modal-done button { width:100%; padding:13px; background:#FFD700; border:none; border-radius:8px; font-size:14px; font-weight:900; cursor:pointer; color:#333; font-family:Arial,sans-serif; }
.modal-done button:active { background:#e6c200; }

/* CYCLE INFO BOX */
.cycle-box { background:#f9f9f9; border:1px solid #e8e8e8; border-radius:8px; padding:10px 12px; margin-bottom:12px; font-size:12px; color:#555; line-height:1.7; display:none; }
.cycle-box strong { color:#333; }
.cycle-row { display:flex; justify-content:space-between; border-bottom:1px solid #eee; padding:3px 0; }
.cycle-row:last-child { border-bottom:none; }
.cyc-done { color:#2a7a2a; font-weight:700; }
.cyc-part { color:#e07000; font-weight:700; }

/* PREVIEW */
#preview-wrap { padding:18px 10px 30px; background:#ddd; }
#a4 { width:100%; max-width:210mm; margin:0 auto; background:#fff; padding:10mm 8mm; box-shadow:0 4px 20px rgba(0,0,0,0.2); }

/* A4 CONTENT */
.title-box { border:1.5px solid #aab; background:#eef0f8; text-align:center; padding:7px 10px; margin-bottom:10px; }
.title-box span { font-size:13px; font-weight:bold; letter-spacing:2px; color:#222; }
.col-hdr { display:flex; margin-bottom:4px; padding-left:105px; }
.col-a { width:105px; font-size:11px; font-weight:900; text-align:center; letter-spacing:1px; }
.col-g { font-size:11px; font-weight:900; text-align:center; margin-left:10px; letter-spacing:1px; }
.srow  { display:flex; align-items:baseline; min-height:18px; margin-bottom:1px; border-bottom:0.5px solid #f5f5f5; padding:1.5px 0; }
.dcell { width:105px; flex-shrink:0; font-size:8.5px; padding-right:3px; line-height:1.5; }
.sun-am  { color:#2a7a2a; font-weight:bold; }
.sun-pm  { color:#2244cc; font-weight:bold; padding-left:7px; }
.wed-lbl { color:#cc2222; font-weight:bold; }
.bul  { color:#2244cc; margin-right:1px; }
.naud { width:105px; flex-shrink:0; font-size:9px; font-weight:bold; color:#1a1aaa; text-align:center; }
.ngat { font-size:9px; font-weight:bold; color:#1a1aaa; margin-left:10px; text-align:center; }
.empty-msg { color:#bbb; font-size:13px; text-align:center; padding:40px 10px; line-height:1.7; }

/* PRINT FOOTER */
#print-foot { padding:12px 16px 20px; background:#f0f0f0; }
#print-foot button { width:100%; padding:13px; background:#fff; border:1.5px solid #ccc; border-radius:8px; font-size:14px; cursor:pointer; color:#444; font-family:Arial,sans-serif; }

/* PRINT */
@media print {
  @page { size:A4 portrait; margin:15mm 18mm; }
  .hdr,.tabs,.panel,.settings,#print-foot,.cycle-box,.names-bar,.modal-backdrop { display:none !important; }
  body { background:#fff; padding:0; }
  #preview-wrap { padding:0 !important; background:none !important; }
  #a4 { width:100% !important; max-width:none !important; box-shadow:none !important; padding:0 !important; }
  .title-box span { font-size:13pt !important; }
  .col-a,.col-g { font-size:12pt !important; }
  .dcell { font-size:9pt !important; }
  .naud,.ngat { font-size:10pt !important; }
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div>
    <h1><img src="https://via.placeholder.com/44x44.png?text=Logo" alt="Logo"> Attendant's Schedule</h1>
    <p>Fair rotation &mdash; no one repeats until all served</p>
  </div>
  <div class="badge" id="badge">Cycle: 1</div>
</div>

<!-- NAMES SUMMARY BAR (tap to open editor popup) -->
<div class="names-bar">
  <button class="names-card green" onclick="openNamesModal('aud')">
    <div>
      <div class="nc-title">&#9728; Sun AM Names</div>
      <div class="nc-sub" id="aud-count">0 people</div>
    </div>
    <span class="nc-arrow">&#9998;</span>
  </button>
  <button class="names-card blue" onclick="openNamesModal('gate')">
    <div>
      <div class="nc-title">&#9729; Sun PM Names</div>
      <div class="nc-sub" id="gate-count">0 people</div>
    </div>
    <span class="nc-arrow">&#9998;</span>
  </button>
</div>

<!-- NAME EDITOR MODAL (popup, hidden until a summary card is tapped) -->
<div class="modal-backdrop" id="modal-backdrop" onclick="closeNamesModal(event)">
  <div class="modal-sheet" id="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-hdr">
      <div class="m-title" id="modal-title">Sun AM Names</div>
      <button class="modal-close" onclick="closeNamesModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="panel-label" id="modal-desc"></div>
      <div class="name-list" id="modal-list"></div>
      <button class="btn-add" id="modal-add"></button>
    </div>
    <div class="modal-done">
      <button onclick="closeNamesModal()">Done</button>
    </div>
  </div>
</div>

<!-- SETTINGS -->
<div class="settings">
  <div class="field">
    <label>Schedule Title</label>
    <input type="text" id="sched-title" value="ATTENDANT'S SCHEDULE 1&amp;2">
  </div>
  <div class="row2">
    <div class="field">
      <label>Start Date</label>
      <input type="date" id="start-date">
    </div>
    <div class="field">
      <label>Weeks to show</label>
      <input type="number" id="num-weeks" value="4" min="1" max="20">
    </div>
  </div>

  <div class="chip-lbl">Service Days</div>
  <div class="chips">
    <label class="chip on-green" id="ch-sun-am"><input type="checkbox" checked onchange="toggleChip(this,'ch-sun-am','green')"><span class="dot" style="background:#2a7a2a"></span>Sun AM</label>
    <label class="chip on-blue"  id="ch-sun-pm"><input type="checkbox" checked onchange="toggleChip(this,'ch-sun-pm','blue')"><span class="dot"  style="background:#2244cc"></span>Sun PM</label>
    <label class="chip"          id="ch-wed"   ><input type="checkbox"         onchange="toggleChip(this,'ch-wed','red')">   <span class="dot"  style="background:#cc2222"></span>Wed</label>
  </div>

  <div class="err" id="err-msg"></div>
  <button class="btn-gen" onclick="doGenerate()">&#8635; Generate Schedule</button>
  <div class="btn-pair">
    <button class="btn-sec" onclick="doReset()">&#8634; Reset to Cycle 1</button>
    <button class="btn-sec" onclick="window.print()">&#128438; Print / PDF</button>
  </div>

  <!-- CYCLE TRACKER -->
  <div class="cycle-box" id="cycle-box"></div>

  <div class="tip">Everyone serves once before anyone repeats &bull; Works 100% offline</div>
</div>

<!-- PREVIEW -->
<div id="preview-wrap">
  <div id="a4">
    <div class="empty-msg">
      &#128197; Add names above<br>Set your start date<br>
      Tap <strong>Generate Schedule</strong>
    </div>
  </div>
</div>

<!-- PRINT FOOTER -->
<div id="print-foot">
  <button onclick="window.print()">&#128438; Print / Save as PDF</button>
</div>

<script>
// ═══════════════════════════════════════════════════
// DATA  — edit these lists freely
// ═══════════════════════════════════════════════════
var audNames = [
  'Jedloyd R.','Jemrel B.','Alyn Q.','Remdrant M.',
  'Jesrel B.','Jotham J.','Robert R.','Alexander P.',
  'Daveryl Q.','Jasser P.','Rio M.'
];
var gateNames = [
  'Joel J.','Nathaniel A.','William B.','Jerry A.',
  'John Carlo J.','Vicente M.','Virgilio G.','Abner J. Jr'
];

// Global rotation pointer — persists across generates
// amPtr, pmPtr, wedPtr = index of NEXT person to assign in that group
var amPtr  = 0;
var pmPtr  = 0;
var wedPtr = 0;
var cycleNum = 1;

var DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// ═══════════════════════════════════════════════════
// FAIR PICK — picks 2 unique consecutive names from
// a pool starting at ptr, wraps around if needed.
// Returns { aud, gate, newPtr, wrapped (bool) }
// ═══════════════════════════════════════════════════
function fairPick(pool, ptr) {
  var n = pool.length;
  if (n === 0) return { aud:'', gate:'', newPtr:0, wrapped:false };
  if (n === 1) return { aud:pool[0], gate:'', newPtr:ptr, wrapped:false };

  var i1 = ptr % n;
  var i2 = (ptr + 1) % n;
  var wrapped = (ptr + 1) >= n; // completed a full cycle after this pick
  return {
    aud     : pool[i1],
    gate    : pool[i2],
    newPtr  : (ptr + 2) % n,
    cyclesDone : Math.floor((ptr + 2) / n)
  };
}

// ═══════════════════════════════════════════════════
// NAME EDITOR MODAL (popup) — replaces the old always-open tabs
// ═══════════════════════════════════════════════════
var modalType = 'aud';

function openNamesModal(type) {
  modalType = type;
  var isAud = type === 'aud';
  document.getElementById('modal-title').textContent = isAud ? 'Sun AM Names' : 'Sun PM Names';
  document.getElementById('modal-desc').innerHTML = isAud
    ? '<span class="c-green">SUNDAY MORNING &mdash; these people rotate for Auditorium &amp; Gate</span>'
    : '<span class="c-blue">SUNDAY AFTERNOON &mdash; these people rotate for Auditorium &amp; Gate</span>';
  document.getElementById('modal-add').textContent = '\uFF0B Add person';
  document.getElementById('modal-add').onclick = function() { addName(modalType); };
  renderList(type);
  document.getElementById('modal-backdrop').classList.add('on');
  document.body.style.overflow = 'hidden';
}

function closeNamesModal(evt) {
  document.getElementById('modal-backdrop').classList.remove('on');
  document.body.style.overflow = '';
}

function updateCounts() {
  var audN  = audNames.filter(function(n) { return n.trim(); }).length;
  var gateN = gateNames.filter(function(n) { return n.trim(); }).length;
  document.getElementById('aud-count').textContent  = audN  + (audN  === 1 ? ' person' : ' people');
  document.getElementById('gate-count').textContent = gateN + (gateN === 1 ? ' person' : ' people');
}

// ═══════════════════════════════════════════════════
// RENDER NAME LIST (renders into the modal's shared list container)
// ═══════════════════════════════════════════════════
function renderList(type) {
  var arr = type === 'aud' ? audNames : gateNames;
  var el  = document.getElementById('modal-list');
  if (!el) return;
  el.innerHTML = '';
  for (var i = 0; i < arr.length; i++) {
    (function(idx) {
      var row = document.createElement('div');
      row.className = 'name-row';

      var handle = document.createElement('span');
      handle.className = 'drag-handle';
      handle.innerHTML = '&#9776;';

      var num = document.createElement('span');
      num.className = 'row-num';
      num.textContent = idx + 1;

      var inp = document.createElement('input');
      inp.type = 'text';
      inp.value = arr[idx];
      inp.placeholder = 'Enter name\u2026';
      inp.addEventListener('input', (function(i2, tp) {
        return function() {
          if (tp === 'aud') audNames[i2] = this.value;
          else gateNames[i2] = this.value;
        };
      })(idx, type));

      var del = document.createElement('button');
      del.className = 'btn-x';
      del.textContent = '\u00d7';
      del.addEventListener('click', (function(i2, tp) {
        return function() { removeName(tp, i2); };
      })(idx, type));

      row.appendChild(handle);
      row.appendChild(num);
      row.appendChild(inp);
      row.appendChild(del);
      el.appendChild(row);
    })(i);
  }
}

function addName(type) {
  if (type === 'aud') audNames.push('');
  else gateNames.push('');
  renderList(type);
  updateCounts();
  setTimeout(function() {
    var inputs = document.getElementById('modal-list').querySelectorAll('input');
    if (inputs.length) inputs[inputs.length - 1].focus();
  }, 60);
}

function removeName(type, i) {
  if (type === 'aud') audNames.splice(i, 1);
  else gateNames.splice(i, 1);
  renderList(type);
  updateCounts();
}

// ═══════════════════════════════════════════════════
// CHIP TOGGLE
// ═══════════════════════════════════════════════════
function toggleChip(cb, id, color) {
  var el = document.getElementById(id);
  el.classList.remove('on-green','on-blue','on-red','on-purple');
  if (cb.checked) el.classList.add('on-' + color);
}

// ═══════════════════════════════════════════════════
// SERVICE DAYS BUILDER
// ═══════════════════════════════════════════════════
function buildServiceDays(startISO, weeks) {
  var sunAm = document.querySelector('#ch-sun-am input').checked;
  var sunPm = document.querySelector('#ch-sun-pm input').checked;
  var wedOn = document.querySelector('#ch-wed input').checked;
  var parts = startISO.split('-');
  var d = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
  while (d.getDay() !== 0) d.setDate(d.getDate() + 1);
  var end = new Date(d); end.setDate(end.getDate() + weeks * 7);
  var days = [];
  var cur  = new Date(d);
  while (cur < end) {
    var dow = cur.getDay();
    if (dow === 0) {
      if (sunAm) days.push({ d:new Date(cur), t:'sun-am' });
      if (sunPm) days.push({ d:new Date(cur), t:'sun-pm' });
    } else if (dow === 3 && wedOn) {
      days.push({ d:new Date(cur), t:'wed' });
    }
    cur.setDate(cur.getDate() + 1);
  }
  return days;
}

function fmtDate(d, t) {
  var base = DAYS[d.getDay()] + '.' + MONTHS[d.getMonth()] + '.' + d.getDate();
  if (t === 'sun-am') return '<span class="sun-am">'  + base + '- am</span>';
  if (t === 'sun-pm') return '<span class="bul">&bull;</span><span class="sun-pm">' + base + '- pm</span>';
  if (t === 'wed')    return '<span class="wed-lbl">' + base + '</span>';
  return base;
}

// ═══════════════════════════════════════════════════
// GENERATE — FAIR ROTATION CORE
// Each service day picks the NEXT 2 people in queue.
// Pointer advances by 2. Wraps only after everyone served.
// ═══════════════════════════════════════════════════
function doGenerate() {
  var errEl = document.getElementById('err-msg');
  errEl.style.display = 'none';

  var startISO = document.getElementById('start-date').value;
  if (!startISO) {
    errEl.textContent = 'Please set a Start Date first.';
    errEl.style.display = 'block'; return;
  }

  var audF    = audNames.filter(function(n)  { return n.trim(); });
  var gateF   = gateNames.filter(function(n) { return n.trim(); });
  var wedAll  = audF.concat(gateF); // Wednesday uses everyone

  if (!audF.length && !gateF.length) {
    errEl.textContent = 'Please add at least one name.';
    errEl.style.display = 'block'; return;
  }

  var weeks   = parseInt(document.getElementById('num-weeks').value) || 4;
  var title   = document.getElementById('sched-title').value || "ATTENDANT'S SCHEDULE 1&2";
  var svcDays = buildServiceDays(startISO, weeks);

  if (!svcDays.length) {
    errEl.textContent = 'No service days selected. Check a service day chip.';
    errEl.style.display = 'block'; return;
  }

  // Local copies of pointers for this generation
  var localAmPtr  = amPtr;
  var localPmPtr  = pmPtr;
  var localWedPtr = wedPtr;

  // Track cycle completions per group this run
  var amCycles  = 0;
  var pmCycles  = 0;
  var wedCycles = 0;

  var rows = '';

  for (var i = 0; i < svcDays.length; i++) {
    var s = svcDays[i];
    var audName = '', gateName = '';

    if (s.t === 'sun-am') {
      if (audF.length >= 2) {
        var p = fairPick(audF, localAmPtr);
        audName   = p.aud;
        gateName  = p.gate;
        amCycles += p.cyclesDone;
        localAmPtr = p.newPtr;
      } else if (audF.length === 1) {
        audName = audF[0];
        localAmPtr = 0;
      }
    } else if (s.t === 'sun-pm') {
      if (gateF.length >= 2) {
        var p2 = fairPick(gateF, localPmPtr);
        audName   = p2.aud;
        gateName  = p2.gate;
        pmCycles += p2.cyclesDone;
        localPmPtr = p2.newPtr;
      } else if (gateF.length === 1) {
        audName = gateF[0];
        localPmPtr = 0;
      }
    } else {
      // Wed — use combined list
      if (wedAll.length >= 2) {
        var p3 = fairPick(wedAll, localWedPtr);
        audName    = p3.aud;
        gateName   = p3.gate;
        wedCycles += p3.cyclesDone;
        localWedPtr = p3.newPtr;
      } else if (wedAll.length === 1) {
        audName = wedAll[0];
        localWedPtr = 0;
      }
    }

    rows += '<div class="srow">' +
      '<div class="dcell">' + fmtDate(s.d, s.t) + '</div>' +
      '<div class="naud">'  + audName  + '</div>' +
      '<div class="ngat">'  + gateName + '</div>' +
      '</div>';
  }

  // Commit pointer advances
  amPtr  = localAmPtr;
  pmPtr  = localPmPtr;
  wedPtr = localWedPtr;

  // Update cycle badge
  document.getElementById('badge').textContent = 'Cycle: ' + cycleNum;
  cycleNum++;

  // Render schedule
  document.getElementById('a4').innerHTML =
    '<div class="title-box"><span>' + title + '</span></div>' +
    '<div class="col-hdr"><div class="col-a">AUDITORIUM</div><div class="col-g">GATE</div></div>' +
    rows;

  // Show cycle tracker
  showCycleTracker(audF, gateF, wedAll, localAmPtr, localPmPtr, localWedPtr);

  document.getElementById('preview-wrap').scrollIntoView({ behavior:'smooth', block:'start' });
}

// ═══════════════════════════════════════════════════
// CYCLE TRACKER — shows who's next and progress
// ═══════════════════════════════════════════════════
function showCycleTracker(audF, gateF, wedAll, ap, pp, wp) {
  var box = document.getElementById('cycle-box');
  if (!audF.length && !gateF.length) { box.style.display='none'; return; }

  function queueStatus(pool, ptr, label) {
    if (!pool.length) return '';
    var served  = ptr % pool.length;
    var total   = pool.length;
    var nextName = pool[ptr % pool.length];
    var pct = Math.round((served / total) * 100);
    var status = (ptr % pool.length === 0 && ptr > 0) ? '<span class="cyc-done">&#10003; Full cycle done</span>' : '<span class="cyc-part">' + served + '/' + total + ' served (' + pct + '%)</span>';
    return '<div class="cycle-row"><strong>' + label + '</strong><span>Next up: <em>' + nextName + '</em></span>' + status + '</div>';
  }

  var html = '<strong>Rotation Progress</strong><br><br>';
  html += queueStatus(audF,  ap, 'Sun AM group');
  html += queueStatus(gateF, pp, 'Sun PM group');
  if (document.querySelector('#ch-wed input').checked) {
    html += queueStatus(wedAll, wp, 'Wed group');
  }
  box.innerHTML = html;
  box.style.display = 'block';
}

// ═══════════════════════════════════════════════════
// RESET
// ═══════════════════════════════════════════════════
function doReset() {
  amPtr = 0; pmPtr = 0; wedPtr = 0; cycleNum = 1;
  document.getElementById('badge').textContent = 'Cycle: 1';
  document.getElementById('cycle-box').style.display = 'none';
  document.getElementById('a4').innerHTML =
    '<div class="empty-msg">Rotation reset to Cycle 1.<br>Tap Generate to start from person #1.</div>';
}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
window.onload = function() {
  updateCounts();
  var today = new Date();
  var mm = String(today.getMonth() + 1).padStart(2,'0');
  var dd = String(today.getDate()).padStart(2,'0');
  document.getElementById('start-date').value = today.getFullYear() + '-' + mm + '-' + dd;
};
</script>
